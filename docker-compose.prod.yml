services:
  mall_backend:
    image: ${MALL_BACKEND_IMAGE}
    container_name: mall-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - ETCD_ADDR=${ETCD_ADDR}
    working_dir: /data/wwwRoot
    command: ["./mall.backend"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
